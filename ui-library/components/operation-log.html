<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>OperationLog · ERP UI Library</title>
  <link rel="stylesheet" href="../tokens.css" />
  <style>
    .c-oplog { margin: var(--space-6); border: 1px solid var(--color-border-secondary); border-radius: var(--radius-lg); overflow: hidden; background: var(--color-bg-container); }
    .c-oplog__head { padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--color-border-secondary); font-weight: var(--font-weight-medium); }
    .c-oplog table { width: 100%; border-collapse: collapse; font-size: var(--font-size-sm); }
    .c-oplog th, .c-oplog td { padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--color-border-secondary); text-align: left; }
    .c-oplog thead th { background: #fafafa; color: var(--color-text-secondary); font-weight: var(--font-weight-medium); }
  </style>
</head>
<body>
  <section class="c-oplog">
    <div class="c-oplog__head">操作日志（固定字段模板）</div>
    <table>
      <thead>
        <tr>
          <th>操作人</th>
          <th>操作类型</th>
          <th>操作对象</th>
          <th>操作详情</th>
          <th>操作时间</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>freddy</td><td>批量更新</td><td>订单规则 #219</td><td>修改发货时效：48h → 24h</td><td>2026-05-13 11:03:42</td></tr>
        <tr><td>system</td><td>同步任务</td><td>Amazon-US</td><td>订单状态回传成功</td><td>2026-05-13 10:55:21</td></tr>
      </tbody>
    </table>
  </section>
</body>
</html>
