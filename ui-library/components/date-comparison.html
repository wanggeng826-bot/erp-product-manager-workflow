<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>DateComparisonControl · ERP UI Library</title>
  <link rel="stylesheet" href="../tokens.css" />
  <style>
    .c-date {
      margin: var(--space-6); padding: var(--space-4);
      display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap;
      background: var(--color-bg-container); border: 1px solid var(--color-border-secondary); border-radius: var(--radius-lg);
    }
    .c-date__label { color: var(--color-text-secondary); font-size: var(--font-size-sm); }
    .c-date__segment { display: inline-flex; border: 1px solid var(--color-border); border-radius: var(--radius); overflow: hidden; }
    .c-date__segment button {
      border: none; background: var(--color-bg-container); padding: 0 var(--space-3); height: var(--control-height);
      cursor: pointer; font-size: var(--font-size-sm); color: var(--color-text-secondary);
    }
    .c-date__segment button.active { background: var(--color-primary-1); color: var(--color-primary-7); }
  </style>
</head>
<body>
  <section class="c-date">
    <span class="c-date__label">统计时间</span>
    <input class="input" value="2026-05-01 ~ 2026-05-31" />
    <div class="c-date__segment">
      <button class="active">环比上周期</button>
      <button>同比去年同期</button>
      <button>不对比</button>
    </div>
    <button class="btn btn--primary">应用</button>
  </section>
</body>
</html>
