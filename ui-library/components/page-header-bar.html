<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>PageHeaderBar · ERP UI Library</title>
  <link rel="stylesheet" href="../tokens.css" />
  <style>
    /* ============================================================
       Component: PageHeaderBar
       Ant Design 映射：Typography + Space + Button
       规则：一个页面只有一个 H1；一屏只有一个主操作
       ============================================================ */
    .c-page-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
    }
    .c-page-header__left { min-width: 0; }
    .c-page-header__title {
      margin: 0;
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-semibold);
      line-height: var(--line-height-tight);
      color: var(--color-text);
      display: flex; align-items: center; gap: var(--space-3);
    }
    .c-page-header__title-extra {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-tertiary);
    }
    .c-page-header__desc {
      margin: var(--space-1) 0 0;
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
    }
    .c-page-header__actions {
      display: flex; align-items: center; gap: var(--space-2);
      flex-shrink: 0;
      padding: 0;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }

    /* 演示页：把组件放在一个 wrapper 里看效果 */
    .demo-wrap { padding: var(--space-6); }
  </style>
</head>
<body>
  <div class="demo-wrap">

    <!-- ============================================================
         BEGIN COMPONENT: PageHeaderBar · 默认（有主操作 + 描述）
         ============================================================ -->
    <header class="c-page-header">
      <div class="c-page-header__left">
        <h1 class="c-page-header__title">
          订单列表
          <span class="c-page-header__title-extra">共 12,486 单</span>
        </h1>
        <p class="c-page-header__desc">查看、筛选、审核所有渠道的订单。删除和退款请在订单详情中操作。</p>
      </div>
      <div class="c-page-header__actions">
        <button class="btn">导出</button>
        <button class="btn">同步</button>
        <button class="btn btn--primary">+ 新建订单</button>
      </div>
    </header>
    <!-- END COMPONENT -->


    <hr style="margin: 48px 0; border: 0; border-top: 1px dashed var(--color-border);" />


    <!-- ============================================================
         变体 A：极简——只有标题（适合不需要主操作的页面）
         ============================================================ -->
    <header class="c-page-header">
      <div class="c-page-header__left">
        <h1 class="c-page-header__title">销售分析</h1>
      </div>
    </header>


    <hr style="margin: 48px 0; border: 0; border-top: 1px dashed var(--color-border);" />


    <!-- ============================================================
         变体 B：只有 1 个主操作，没有次要操作 / 没有描述
         （列表页最常见形态）
         ============================================================ -->
    <header class="c-page-header">
      <div class="c-page-header__left">
        <h1 class="c-page-header__title">采购单</h1>
      </div>
      <div class="c-page-header__actions">
        <button class="btn btn--primary">+ 新建采购</button>
      </div>
    </header>


    <hr style="margin: 48px 0; border: 0; border-top: 1px dashed var(--color-border);" />


    <!-- ============================================================
         变体 C：禁用态主操作（无权限场景）
         ============================================================ -->
    <header class="c-page-header">
      <div class="c-page-header__left">
        <h1 class="c-page-header__title">权限管理</h1>
        <p class="c-page-header__desc">仅超级管理员可调整。</p>
      </div>
      <div class="c-page-header__actions">
        <button class="btn btn--primary" aria-disabled="true" title="当前角色无权限">+ 新建角色</button>
      </div>
    </header>

  </div>
</body>
</html>
