<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自研 ERP 退款报表</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <div class="brand-mark">ERP</div>
        <div>
          <p class="brand-caption">报表中心</p>
          <h1 class="brand-title">退款经营分析</h1>
        </div>
      </div>

      <nav class="nav-groups">
        <div class="nav-group">
          <p class="nav-group-title">主导航</p>
          <button class="nav-item">首页看板</button>
          <button class="nav-item nav-item-active">退款报表</button>
          <button class="nav-item">订单分析</button>
          <button class="nav-item">客服时效</button>
        </div>
      </nav>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">报表中心 / 退款报表</p>
          <h2 class="page-title">自研 ERP 退款报表</h2>
        </div>
        <div class="topbar-status">
          <span class="status-pill">实时刷新</span>
          <span class="status-pill status-pill-soft">异步导出</span>
        </div>
      </header>

      <main class="main-content">
        <section class="hero-card card">
          <div class="hero-main">
            <div>
              <p class="hero-kicker">退款报表</p>
              <h3>退款总览看板 + 退款明细报表</h3>
              <p class="hero-description">
                统一退款口径，支持经营分析、财务对账、客服时效跟踪与导出任务闭环。
              </p>
            </div>
            <div class="hero-actions" id="heroActions">
              <button class="secondary-btn" data-action="refresh-sync">刷新数据</button>
              <button class="primary-btn" data-action="open-task-tab">导出任务</button>
            </div>
          </div>
          <div class="hero-meta" id="heroMeta"></div>
        </section>

        <section class="control-grid">
          <div class="card content-card full-width">
            <div class="section-heading">
              <div>
                <p class="section-kicker">筛选条件</p>
                <h3>退款查询条件</h3>
              </div>
              <div class="query-actions">
                <button class="ghost-btn" data-action="toggle-advanced" id="advancedToggle">展开高级筛选</button>
                <button class="secondary-btn" data-action="reset-filters">重置</button>
                <button class="primary-btn" data-action="run-query">查询</button>
              </div>
            </div>

            <div class="filters-grid">
              <label class="field field-wide">
                <span>订单号 / 退款单号</span>
                <input id="filterKeyword" data-filter="keyword" type="text" placeholder="支持平台订单号、退款单号回车直查">
              </label>
              <label class="field">
                <span>平台</span>
                <select id="filterPlatform" data-filter="platform"></select>
              </label>
              <label class="field">
                <span>站点</span>
                <select id="filterSite" data-filter="site"></select>
              </label>
              <label class="field">
                <span>店铺</span>
                <select id="filterShop" data-filter="shop"></select>
              </label>
              <label class="field">
                <span>时间类型</span>
                <select id="filterDateType" data-filter="dateType"></select>
              </label>
              <label class="field">
                <span>时间范围</span>
                <select id="filterDatePreset" data-filter="datePreset"></select>
              </label>
              <label class="field">
                <span>时间粒度</span>
                <select id="filterGranularity" data-filter="granularity"></select>
              </label>
              <label class="field">
                <span>退款状态</span>
                <select id="filterStatus" data-filter="status"></select>
              </label>
            </div>

            <div class="advanced-filters" id="advancedFilters" hidden>
              <div class="filters-grid">
                <label class="field">
                  <span>退款业务类型</span>
                  <select id="filterBizType" data-filter="bizType"></select>
                </label>
                <label class="field">
                  <span>退款处理类型</span>
                  <select id="filterProcessType" data-filter="processType"></select>
                </label>
                <label class="field">
                  <span>退款金额类型</span>
                  <select id="filterAmountType" data-filter="amountType"></select>
                </label>
                <label class="field">
                  <span>退款原因</span>
                  <select id="filterReason" data-filter="reason"></select>
                </label>
                <label class="field">
                  <span>责任归因方</span>
                  <select id="filterOwner" data-filter="owner"></select>
                </label>
                <label class="field">
                  <span>发货仓</span>
                  <select id="filterWarehouse" data-filter="warehouse"></select>
                </label>
              </div>
            </div>

            <div class="applied-summary" id="appliedSummary"></div>
          </div>
        </section>

        <section class="card page-card">
          <div class="tab-bar" id="tabBar"></div>
          <div id="pageView"></div>
        </section>
      </main>
    </div>
  </div>

  <div class="scrim" id="scrim" data-action="close-all-overlays" hidden></div>

  <aside class="drawer" id="detailDrawer" aria-hidden="true">
    <div class="drawer-header">
      <div>
        <p class="drawer-kicker">退款明细详情</p>
        <h3 id="detailDrawerTitle">退款单详情</h3>
      </div>
      <button class="icon-btn" data-action="close-detail-drawer" aria-label="关闭详情抽屉">×</button>
    </div>
    <div class="drawer-body" id="detailDrawerBody"></div>
    <div class="drawer-footer" id="detailDrawerFooter"></div>
  </aside>

  <aside class="drawer drawer-medium" id="taskDrawer" aria-hidden="true">
    <div class="drawer-header">
      <div>
        <p class="drawer-kicker">异步导出</p>
        <h3>最近导出任务</h3>
      </div>
      <button class="icon-btn" data-action="close-task-drawer" aria-label="关闭任务抽屉">×</button>
    </div>
    <div class="drawer-body" id="taskDrawerBody"></div>
  </aside>

  <section class="modal-shell" id="columnModal" hidden>
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <p class="drawer-kicker">列管理</p>
          <h3>配置退款明细默认列</h3>
        </div>
        <button class="icon-btn" data-action="close-column-modal" aria-label="关闭列管理">×</button>
      </div>
      <div class="modal-body" id="columnModalBody"></div>
      <div class="modal-footer">
        <button class="secondary-btn" data-action="close-column-modal">取消</button>
        <button class="primary-btn" data-action="apply-column-settings">应用</button>
      </div>
    </div>
  </section>

  <div class="toast-stack" id="toastStack" aria-live="polite"></div>

  <script src="./script.js"></script>
</body>
</html>
