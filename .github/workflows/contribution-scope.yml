name: Contribution Scope

on:
  pull_request:
    branches:
      - main

jobs:
  knowledge-only:
    name: External PRs should only change knowledge
    runs-on: ubuntu-latest
    steps:
      - name: Check changed paths
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const pr = context.payload.pull_request;
            const pull_number = pr.number;
            const isInternalBranch = pr.head.repo.full_name === `${owner}/${repo}`;
            const isWorkflowBranch = pr.head.ref.startsWith('codex/');
            const isMaintainerBot = pr.user.login === 'wanggeng826-bot';

            if (isInternalBranch && (isWorkflowBranch || isMaintainerBot)) {
              core.info(
                `Skipping knowledge-only path restriction for internal workflow PR: ${pr.head.ref} by ${pr.user.login}.`
              );
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100
            });
            const blocked = files
              .map(file => file.filename)
              .filter(name => !name.startsWith('knowledge/'));
            if (blocked.length) {
              core.setFailed(
                [
                  'This repository accepts external content contributions only under knowledge/**.',
                  'Blocked paths:',
                  ...blocked.map(name => `- ${name}`)
                ].join('\n')
              );
            }
